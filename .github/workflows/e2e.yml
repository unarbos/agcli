name: E2E

# Heavy job (image pull + long chain test). Run on main pushes and manual trigger only —
# not on every PR, so CI stays responsive.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  METADATA_CHAIN_ENDPOINT: wss://entrypoint-finney.opentensor.ai:443

jobs:
  e2e-docker:
    name: E2E (Docker localnet)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Verify Docker daemon
        run: docker version && docker info
      - name: Pull subtensor localnet image
        run: docker pull ghcr.io/opentensor/subtensor-localnet:devnet-ready
      - name: Run e2e_local_chain
        run: cargo test -p agcli --features e2e --test e2e_test e2e_local_chain -- --nocapture
        timeout-minutes: 60
        env:
          CARGO_INCREMENTAL: "1"
