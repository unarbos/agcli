name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  METADATA_CHAIN_ENDPOINT: wss://entrypoint-finney.opentensor.ai:443
  NEXTEST_PROFILE: ci

jobs:
  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Clippy
        # Same integration crates as the nextest job (avoid `--tests`: pulls proptest/stress + full `#[cfg(test)]` clippy).
        run: >-
          cargo clippy --lib --bins
          --test wallet_test --test cli_weights
          --test cli_test --test helpers_test
          -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      - name: Run tests
        run: >-
          cargo nextest run --lib
          --test wallet_test --test cli_weights
          --test cli_test --test helpers_test
        timeout-minutes: 25

  coverage:
    name: Coverage
    # Same tests as `test` but with llvm-cov instrumentation — skip on PRs to save ~15–25 min.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: taiki-e/install-action@nextest
      - name: Generate coverage
        run: >-
          cargo llvm-cov nextest --lib
          --test wallet_test --test cli_weights
          --test cli_test --test helpers_test
          --ignore-filename-regex '(tests/|build\.rs|main\.rs|admin\.rs|localnet\.rs|live\.rs|events\.rs|scaffold\.rs|error\.rs|lib\.rs|chain/|extrinsics/|queries/|cli/|config\.rs|wallet/|types/balance\.rs|utils/explain\.rs)'
          --codecov --output-path codecov.json
        timeout-minutes: 25
      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: codecov.json
          fail_ci_if_error: false
          use_oidc: true

  build:
    name: Build Release
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release binary
        run: cargo build --release
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: agcli-linux-amd64
          path: target/release/agcli
